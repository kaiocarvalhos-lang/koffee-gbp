{% extends "base.html" %}
{% block title %}Login — Koffee GBP{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="font-syne font-extrabold text-2xl text-car tracking-wide mb-1">Koffee <span class="text-gray-600">Marketing</span></div>
      <div class="text-xs text-gray-600 tracking-widest uppercase">GBP Analyzer</div>
    </div>

    <div class="card p-8">
      <h1 class="font-syne font-bold text-lg mb-6">Entrar</h1>
      <form method="POST">
        <div class="mb-4">
          <label class="block text-xs text-gray-500 uppercase tracking-wider mb-2">E-mail</label>
          <input type="email" name="email" placeholder="seu@email.com" required autofocus/>
        </div>
        <div class="mb-6">
          <label class="block text-xs text-gray-500 uppercase tracking-wider mb-2">Senha</label>
          <input type="password" name="senha" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-car w-full py-3 rounded-lg text-sm tracking-widest uppercase">Entrar →</button>
      </form>
    </div>

    <div class="mt-6 text-center text-xs text-gray-700">
      Koffee Marketing · Acesso restrito à equipe
    </div>
  </div>
</div>
{% endblock %}
